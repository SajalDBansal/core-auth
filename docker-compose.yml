services:
  db:
    container_name: core_auth_db
    platform: linux/amd64
    image: postgres:15
    restart: no
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - core_auth_postgres_data:/var/lib/postgresql/data

volumes:
  core_auth_postgres_data:
